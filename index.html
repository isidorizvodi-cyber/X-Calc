<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>X-Calc</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#F0B429" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="X-Calc" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #F0B429;
      --gold-dim: #C9922A;
      --gold-glow: rgba(240, 180, 41, 0.18);
      --bg: #0E0E12;
      --surface: #16161C;
      --surface2: #1E1E26;
      --surface3: #26262F;
      --btn-num: #1E1E26;
      --btn-op: #2A2A36;
      --btn-special: #232330;
      --text: #FFFFFF;
      --text-dim: rgba(255,255,255,0.45);
      --text-muted: rgba(255,255,255,0.25);
      --radius: 16px;
      --radius-sm: 10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 10px;
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .logo .x { color: var(--gold); }
    .logo .rest { color: #fff; }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      background: var(--surface2);
      border-radius: 50px;
      padding: 3px;
      gap: 2px;
    }
    .mode-btn {
      padding: 5px 14px;
      border: none;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--text-dim);
      letter-spacing: 0.3px;
    }
    .mode-btn.active {
      background: var(--gold);
      color: #0E0E12;
    }

    /* ── CALCULATOR WRAPPER ── */
    .calc-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 16px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1.5px solid rgba(240,180,41,0.45);
      border-radius: 24px;
      box-shadow: 0 0 32px rgba(240,180,41,0.08), inset 0 0 24px rgba(240,180,41,0.03);
      margin: 0 12px 24px;
      background: var(--surface);
    }

    /* ── DISPLAY ── */
    .display {
      background: var(--bg);
      border-radius: var(--radius);
      padding: 20px 22px 16px;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      border: 1px solid rgba(240,180,41,0.3);
      position: relative;
      overflow: hidden;
    }

    .display::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.6;
    }

    .display-history {
      font-size: 14px;
      color: var(--text-dim);
      min-height: 20px;
      text-align: right;
      font-weight: 400;
      letter-spacing: 0.2px;
      margin-bottom: 6px;
      word-break: break-all;
    }

    .display-main {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: -2px;
      text-align: right;
      line-height: 1;
      word-break: break-all;
      transition: font-size 0.1s;
    }

    .display-main.shrink { font-size: 34px; letter-spacing: -1px; }
    .display-main.tiny { font-size: 24px; letter-spacing: -0.5px; }

    /* ── BUTTONS ── */
    .btn-grid {
      display: grid;
      gap: 10px;
    }

    .btn-grid.standard { grid-template-columns: repeat(4, 1fr); }
    .btn-grid.scientific { grid-template-columns: repeat(4, 1fr); }

    .btn {
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .btn:active { transform: scale(0.92); }

    /* Number buttons */
    .btn-num {
      background: var(--btn-num);
      color: var(--text);
      border: 1px solid rgba(240,180,41,0.25);
    }
    .btn-num:hover { background: #252530; border-color: rgba(240,180,41,0.45); }

    /* Operator buttons */
    .btn-op {
      background: var(--btn-op);
      color: var(--gold);
      border: 1px solid rgba(240,180,41,0.45);
      font-weight: 600;
    }
    .btn-op:hover { background: #30303E; border-color: rgba(240,180,41,0.75); }

    /* Special (AC, +/-, %) */
    .btn-special {
      background: var(--btn-special);
      color: var(--text-dim);
      border: 1px solid rgba(240,180,41,0.25);
      font-weight: 600;
    }
    .btn-special:hover { background: #2C2C3A; border-color: rgba(240,180,41,0.45); }

    /* Equals — gold */
    .btn-eq {
      background: var(--gold);
      color: #0E0E12;
      font-size: 24px;
      font-weight: 700;
      border: none;
      box-shadow: 0 4px 20px rgba(240,180,41,0.3);
    }
    .btn-eq:hover { background: #F5BF3A; box-shadow: 0 4px 28px rgba(240,180,41,0.45); }
    .btn-eq:active { transform: scale(0.92); }

    /* Wide button (0 spans 2 cols) */
    .btn-wide {
      aspect-ratio: unset;
      padding: 0 28px;
      justify-content: flex-start;
      grid-column: span 2;
    }

    /* Scientific small text */
    .btn-sci {
      background: var(--surface3);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(240,180,41,0.25);
      font-size: 13px;
      font-weight: 500;
    }
    .btn-sci:hover { background: #2E2E3A; border-color: rgba(240,180,41,0.5); }

    /* Scientific panel */
    .sci-panel {
      display: none;
    }
    .sci-panel.visible {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 2px;
    }
    .btn-sci { aspect-ratio: unset; padding: 12px 0; }

    /* Angle toggle */
    .angle-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 2px;
    }
    .angle-btn {
      padding: 5px 12px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    .angle-btn.active {
      background: var(--gold-glow);
      border-color: var(--gold);
      color: var(--gold);
    }
    .angle-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 4px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      border-radius: 1px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo"><span class="x">X-</span><span class="rest">Calc</span></div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnStd" onclick="setMode('standard')">Standard</button>
    <button class="mode-btn" id="btnSci" onclick="setMode('scientific')">Naučni</button>
  </div>
</div>

<div class="calc-wrapper">

  <!-- Display -->
  <div class="display">
    <div class="display-history" id="history"></div>
    <div class="display-main" id="mainDisplay">0</div>
  </div>

  <!-- Scientific panel (hidden by default) -->
  <div class="sci-panel" id="sciPanel">
    <div class="angle-row" style="grid-column:span 4; display:flex;">
      <button class="angle-btn active" id="btnDeg" onclick="setAngle('deg')">DEG</button>
      <button class="angle-btn" id="btnRad" onclick="setAngle('rad')">RAD</button>
      <span class="angle-label">Jedinica kuta</span>
    </div>
    <button class="btn btn-sci" onclick="sciFunc('sin')">sin</button>
    <button class="btn btn-sci" onclick="sciFunc('cos')">cos</button>
    <button class="btn btn-sci" onclick="sciFunc('tan')">tan</button>
    <button class="btn btn-sci" onclick="sciFunc('log')">log</button>
    <button class="btn btn-sci" onclick="sciFunc('ln')">ln</button>
    <button class="btn btn-sci" onclick="sciFunc('sqrt')">√</button>
    <button class="btn btn-sci" onclick="sciFunc('sq')">x²</button>
    <button class="btn btn-sci" onclick="sciFunc('pow')">xʸ</button>
    <button class="btn btn-sci" onclick="sciFunc('pi')">π</button>
    <button class="btn btn-sci" onclick="sciFunc('e')">e</button>
    <button class="btn btn-sci" onclick="sciFunc('inv')">1/x</button>
    <button class="btn btn-sci" onclick="sciFunc('fact')">n!</button>
  </div>

  <!-- Standard buttons -->
  <div class="btn-grid standard" id="stdGrid">
    <!-- Row 1 -->
    <button class="btn btn-special" onclick="calcClear()">AC</button>
    <button class="btn btn-special" onclick="toggleSign()">+/−</button>
    <button class="btn btn-special" onclick="calcPercent()">%</button>
    <button class="btn btn-op" onclick="setOp('÷')">÷</button>
    <!-- Row 2 -->
    <button class="btn btn-num" onclick="appendNum('7')">7</button>
    <button class="btn btn-num" onclick="appendNum('8')">8</button>
    <button class="btn btn-num" onclick="appendNum('9')">9</button>
    <button class="btn btn-op" onclick="setOp('×')">×</button>
    <!-- Row 3 -->
    <button class="btn btn-num" onclick="appendNum('4')">4</button>
    <button class="btn btn-num" onclick="appendNum('5')">5</button>
    <button class="btn btn-num" onclick="appendNum('6')">6</button>
    <button class="btn btn-op" onclick="setOp('−')">−</button>
    <!-- Row 4 -->
    <button class="btn btn-num" onclick="appendNum('1')">1</button>
    <button class="btn btn-num" onclick="appendNum('2')">2</button>
    <button class="btn btn-num" onclick="appendNum('3')">3</button>
    <button class="btn btn-op" onclick="setOp('+')">+</button>
    <!-- Row 5 -->
    <button class="btn btn-num btn-wide" onclick="appendNum('0')">0</button>
    <button class="btn btn-num" onclick="appendDot()">.</button>
    <button class="btn btn-eq" onclick="calcEquals()">=</button>
  </div>

</div>

<script>
  let display = '0';
  let history = '';
  let operator = null;
  let prevValue = null;
  let waitingForOperand = false;
  let angleMode = 'deg'; // deg or rad
  let sciPending = null; // for xʸ

  const mainEl = document.getElementById('mainDisplay');
  const histEl = document.getElementById('history');

  function updateDisplay() {
    mainEl.textContent = display;
    histEl.textContent = history;
    // Shrink font if needed
    mainEl.classList.remove('shrink', 'tiny');
    if (display.length > 12) mainEl.classList.add('tiny');
    else if (display.length > 8) mainEl.classList.add('shrink');
  }

  function appendNum(n) {
    if (waitingForOperand) {
      display = n;
      waitingForOperand = false;
    } else {
      display = display === '0' ? n : display + n;
    }
    updateDisplay();
  }

  function appendDot() {
    if (waitingForOperand) { display = '0.'; waitingForOperand = false; }
    else if (!display.includes('.')) display += '.';
    updateDisplay();
  }

  function calcClear() {
    display = '0'; history = ''; operator = null;
    prevValue = null; waitingForOperand = false; sciPending = null;
    updateDisplay();
  }

  function toggleSign() {
    display = display.startsWith('-') ? display.slice(1) : '-' + display;
    if (display === '-0') display = '0';
    updateDisplay();
  }

  function calcPercent() {
    display = String(parseFloat(display) / 100);
    updateDisplay();
  }

  function setOp(op) {
    if (sciPending === 'pow') {
      // xʸ — apply now
      const base = prevValue !== null ? prevValue : parseFloat(display);
      display = String(Math.pow(base, parseFloat(display)));
      prevValue = null; sciPending = null;
      history = '';
      waitingForOperand = true;
      updateDisplay();
      return;
    }
    if (operator && !waitingForOperand) calcEquals(true);
    prevValue = parseFloat(display);
    operator = op;
    history = display + ' ' + op;
    waitingForOperand = true;
    updateDisplay();
  }

  function calcEquals(silent = false) {
    if (operator === null || prevValue === null) return;
    const current = parseFloat(display);
    let result;
    switch (operator) {
      case '+': result = prevValue + current; break;
      case '−': result = prevValue - current; break;
      case '×': result = prevValue * current; break;
      case '÷': result = current !== 0 ? prevValue / current : 'Greška'; break;
      default: return;
    }
    if (!silent) history = prevValue + ' ' + operator + ' ' + current + ' =';
    display = typeof result === 'number' ? formatNum(result) : result;
    operator = null; prevValue = null; waitingForOperand = true;
    updateDisplay();
  }

  function formatNum(n) {
    if (isNaN(n) || !isFinite(n)) return 'Greška';
    // Avoid floating point noise
    let s = parseFloat(n.toPrecision(12)).toString();
    return s;
  }

  // ── Scientific functions ──
  function toRad(v) { return angleMode === 'deg' ? v * Math.PI / 180 : v; }

  function sciFunc(fn) {
    const v = parseFloat(display);
    let result;
    switch(fn) {
      case 'sin':  result = Math.sin(toRad(v)); history = 'sin(' + display + ')'; break;
      case 'cos':  result = Math.cos(toRad(v)); history = 'cos(' + display + ')'; break;
      case 'tan':  result = Math.tan(toRad(v)); history = 'tan(' + display + ')'; break;
      case 'log':  result = Math.log10(v);      history = 'log(' + display + ')'; break;
      case 'ln':   result = Math.log(v);        history = 'ln(' + display + ')';  break;
      case 'sqrt': result = Math.sqrt(v);       history = '√(' + display + ')';   break;
      case 'sq':   result = v * v;              history = display + '²';          break;
      case 'inv':  result = 1 / v;              history = '1/(' + display + ')';  break;
      case 'fact': result = factorial(v);        history = display + '!';          break;
      case 'pi':   display = String(Math.PI);   history = 'π'; updateDisplay(); return;
      case 'e':    display = String(Math.E);    history = 'e'; updateDisplay();  return;
      case 'pow':
        prevValue = v;
        sciPending = 'pow';
        history = display + ' ^ ';
        operator = '^';
        waitingForOperand = true;
        updateDisplay();
        return;
    }
    display = formatNum(result);
    waitingForOperand = true;
    updateDisplay();
  }

  function factorial(n) {
    n = Math.round(n);
    if (n < 0) return NaN;
    if (n === 0 || n === 1) return 1;
    if (n > 170) return Infinity;
    let r = 1;
    for (let i = 2; i <= n; i++) r *= i;
    return r;
  }

  // ── Mode & Angle ──
  function setMode(mode) {
    document.getElementById('btnStd').classList.toggle('active', mode === 'standard');
    document.getElementById('btnSci').classList.toggle('active', mode === 'scientific');
    const sci = document.getElementById('sciPanel');
    sci.classList.toggle('visible', mode === 'scientific');
  }

  function setAngle(a) {
    angleMode = a;
    document.getElementById('btnDeg').classList.toggle('active', a === 'deg');
    document.getElementById('btnRad').classList.toggle('active', a === 'rad');
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if ('0123456789'.includes(e.key)) appendNum(e.key);
    else if (e.key === '.') appendDot();
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('−');
    else if (e.key === '*') setOp('×');
    else if (e.key === '/') { e.preventDefault(); setOp('÷'); }
    else if (e.key === 'Enter' || e.key === '=') calcEquals();
    else if (e.key === 'Escape') calcClear();
    else if (e.key === 'Backspace') {
      if (display.length > 1) display = display.slice(0, -1);
      else display = '0';
      updateDisplay();
    }
  });

  updateDisplay();

  // Registracija Service Workera
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .catch(err => console.warn('SW registration failed:', err));
    });
  }
</script>
</body>
</html>
